name: Release

# Publish to npm via Trusted Publisher (OIDC).
# No NPM_TOKEN is required — npm accepts a short-lived OIDC token issued by
# GitHub Actions. See RELEASING.md for the one-time setup.
#
# Trigger:
#   1. Push a tag that matches `v*` (e.g. `v0.2.0`) after bumping package.json
#      and pushing to main. The tag version MUST match package.json's version.
#   2. Or trigger manually via the Actions tab (workflow_dispatch) — useful
#      when re-running a failed publish.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, run `npm publish --dry-run` only (no actual publish).'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    # Required for npm Trusted Publisher (OIDC)
    permissions:
      contents: write # needed to create a GitHub Release
      id-token: write # needed for npm provenance + OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            echo "Bump package.json first, commit, then push the matching tag."
            exit 1
          fi

      - name: Publish to npm (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --provenance --access public --dry-run

      - name: Publish to npm
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm publish --provenance --access public

      - name: Extract changelog entry
        if: github.event_name == 'push'
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between `## [VERSION]` and the next `## [`
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            /^## \[/ && flag { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for $VERSION — falling back to a generic note." > release_notes.md
          fi
          echo "notes_path=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.notes_path }}
          draft: false
          prerelease: false
